<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elte Calendar</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background: #f9f9f9;
        }

        .calendar-container {
            max-width: 420px;
            margin: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            padding: 10px;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 6px 10px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #0078D7;
            color: white;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.95);
        }

        h2 {
            margin: 5px 0;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        th,
        td {
            border: 1px solid #ddd;
            text-align: center;
            padding: 6px 0;
            font-size: 14px;
            color: yellowgreen;
        }

        th {
            background: #f0f0f0;
        }

        td {
            height: 40px;
        }

        .today {
            background: red;
            border-radius: 0%;
            font-weight: bold;
        }

        #monthYear {
            color: yellowgreen;
        }

        /* Mobile optimization */
        @media (max-width: 400px) {

            th,
            td {
                font-size: 12px;
                padding: 4px 0;
                height: 34px;
            }

            button {
                font-size: 14px;
                padding: 5px 8px;
            }
        }
    </style>
</head>

<body>

    <div class="calendar-container">

        <div class="nav">
            <button onclick="changeMonth(-1)">◀</button>
            <h2 id="monthYear"></h2>
            <button onclick="changeMonth(1)">▶</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Thaw</th>
                    <th>Wan</th>
                    <th>Thu</th>
                    <th>Fri</th>
                    <th>Sat</th>
                    <th>Hie</th>
                    <th>Dak</th>
                </tr>
            </thead>
            <tbody id="calendarBody"></tbody>
        </table>

    </div>

    <script>
        const CURRENT_YEAR = 2020;
        const today = new Date();
        let currentMonth = today.getMonth();
        let currentYear = today.getFullYear();

        function convertCurrentYear() {
            let subtract = currentYear - CURRENT_YEAR;
            return 'current_year+' + subtract.toString();
        }

        function toTuesdayFirst(day) {
            return (day + 5) % 7;
        }

        function renderCalendar(year, month) {
            const monthNames = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            const monthNames_2 = [
                "M11", "M12", "M1", "M2", "M3", "M4",
                "M5", "M6", "M7", "M8", "M9", "M10"
            ];

            document.getElementById("monthYear").textContent =
                monthNames_2[month] + " " + convertCurrentYear(year);

            const firstDay = new Date(year, month, 1);
            const startIndex = toTuesdayFirst(firstDay.getDay());
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const body = document.getElementById("calendarBody");
            body.innerHTML = "";

            let date = 1;

            for (let r = 0; r < 6; r++) {
                const row = document.createElement("tr");

                for (let c = 0; c < 7; c++) {
                    const cell = document.createElement("td");

                    if (r === 0 && c < startIndex || date > daysInMonth) {
                        cell.textContent = "";
                    } else {
                        cell.textContent = date;

                        if (
                            date === today.getDate() &&
                            month === today.getMonth() &&
                            year === today.getFullYear()
                        ) {
                            cell.classList.add("today");
                        }

                        date++;
                    }

                    row.appendChild(cell);
                }

                body.appendChild(row);
                if (date > daysInMonth) break;
            }
        }

        function changeMonth(step) {
            currentMonth += step;

            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }

            renderCalendar(currentYear, currentMonth);
        }

        renderCalendar(currentYear, currentMonth);
    </script>

</body>

</html>
